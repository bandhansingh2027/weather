<!DOCTYPE html>
<html>
    <head>
        <style>
      body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #00c6ff, #0072ff);
      }
      .weather-box{
        background-color: rgba(255, 255, 255, 0.8);
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }
      h1{
        margin-bottom: 20px;
      }
      input{
        padding: 10px;
        width: 200px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
        button{
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            background-color: #0072ff;
            color: white;
            cursor: pointer;
        }

        .result{
            margin-top: 20px;
            font-size: 18px;
        }
        </style>
        <title>Weather Widget</title>
    </head>
    <body>
        <div class = "weather-box">
            <h1>Weather Widget</h1>
            <input type ="text" id = "city" placeholder = "Enter city name">
            <button onClick = "getWeather()">Search</button>
            <div class = "result" id = "result"></div>

        </div>
        <script>
            async function getWeather() {
                const city = document.getElementById("city").value;
                const result = document.getElementById("result");
                if(!city) {
                    result.innerHTML = "Please enter a city name.";
                    return;
                }

                try{
                    // convert city to longitude and latitude
                    const geoResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
                    const geoData = await geoResponse.json();
                    if(!geoData.results || geoData.results.length === 0) {
                        result.innerHTML = "City not found.";
                        return;
                    }
                    const latitude = geoData.results[0].latitude;
                    const longitude = geoData.results[0].longitude;
                    const name = geoData.results[0].name;
                    // fetch weather data using the coordinates
                    const weatherResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m`);
                    const weatherData = await weatherResponse.json();
                    // display the weather information
                    result.innerHTML = `
                        <h2>${name}</h2>
                        <p>Temperature: ${weatherData.current.temperature_2m}°C</p>
                       
                    `;
                } catch (error) {
                    result.innerHTML = "Error fetching weather data.";
                }
            }
        </script>
    </body>
</html>
